<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="236" fill="#1e1b18" stroke="#b2794c" stroke-width="16" />
  
  <!-- Scissors paths (Sleek minimalist style) -->
  <g fill="#b2794c" stroke="#b2794c" stroke-width="4" stroke-linejoin="round">
    <!-- Left loop of scissors -->
    <path d="M180 380c-25 0-45-20-45-45s20-45 45-45 45 20 45 45-20 45-45 45zm0-70c-14 0-25 11-25 25s11 25 25 25 25-11 25-25-11-25-25-25z" />
    
    <!-- Right loop of scissors -->
    <path d="M332 380c-25 0-45-20-45-45s20-45 45-45 45 20 45 45-20 45-45 45zm0-70c-14 0-25 11-25 25s11 25 25 25 25-11 25-25-11-25-25-25z" />
    
    <!-- Blades crossed (Left loop to right blade, right loop to left blade) -->
    <!-- Pivot point at cx 256 cy 280 -->
    <path d="M195 310 L256 270 L300 130 C300 130 270 145 256 180 L220 270 Z" />
    <path d="M317 310 L256 270 L212 130 C212 130 242 145 256 180 L292 270 Z" />
    
    <!-- Pivot screw -->
    <circle cx="256" cy="270" r="10" fill="#1e1b18" />
  </g>
</svg>